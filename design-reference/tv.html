<html lang="en" vid="0"><head vid="1">
<meta charset="UTF-8" vid="2">
<meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
<title vid="4">Fresh Harvest Display Portfolio</title>
<style vid="5">
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@700;900&family=Space+Mono:wght@700&display=swap');

    :root {
        --c-cream: #FFF6E5;
        --c-brown: #5D3E2E;
        --c-yellow: #F4B843;
        --c-orange: #E28935;
        --c-red: #D36A49;
        --c-screen-off: #1A1512;
        --c-osd: #4ADE80;
        
        
        --shelf-wood: #D29B62;
        --shelf-shadow: #8B5E34;
        
        --stroke: 4px solid var(--c-brown);
        --font-display: 'Fredoka', sans-serif;
        --font-body: 'Nunito', sans-serif;
        --font-mono: 'Space Mono', monospace;
        
        --shadow-solid: 6px 6px 0px var(--c-brown);
        --shadow-solid-sm: 3px 3px 0px var(--c-brown);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
    }

    body {
        background-color: #EADDC8;
        background-image: radial-gradient(var(--c-brown) 1px, transparent 1px);
        background-size: 20px 20px;
        background-position: 0 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: var(--font-body);
        color: var(--c-brown);
        overflow: hidden;
    }

    #scene {
        display: flex;
        gap: 60px;
        align-items: flex-end;
        perspective: 1000px;
        transform: scale(1);
    }

    .tv-wrapper {
        position: relative;
    }

    
    .tv-body {
        background: var(--shelf-wood);
        border: var(--stroke);
        border-radius: 12px;
        padding: 30px;
        display: flex;
        gap: 30px;
        box-shadow: 
            inset 0px -15px 0px var(--shelf-shadow), 
            inset 0px 10px 0px rgba(255,255,255,0.2),
            15px 20px 0px var(--c-brown); 
        position: relative;
        z-index: 10;
    }

    
    .tv-body::before, .tv-body::after {
        content: '';
        position: absolute;
        width: 12px;
        height: 40px;
        background: #A0A0A0;
        border: 3px solid var(--c-brown);
        top: 20px;
        z-index: 11;
    }
    .tv-body::before { left: -8px; border-radius: 4px 0 0 4px; }
    .tv-body::after { right: -8px; border-radius: 0 4px 4px 0; }

    .tv-feet {
        position: absolute;
        bottom: -15px;
        left: 40px;
        right: 40px;
        display: flex;
        justify-content: space-between;
        z-index: 1;
    }
    .foot {
        width: 60px;
        height: 25px;
        background: var(--shelf-shadow);
        border: var(--stroke);
        border-radius: 4px;
        box-shadow: var(--shadow-solid-sm);
    }

    .screen-bezel {
        background: var(--shelf-shadow);
        border: var(--stroke);
        border-radius: 8px;
        padding: 15px;
        box-shadow: inset 0px 4px 0px rgba(0,0,0,0.2);
    }

    .screen-glass {
        width: 500px;
        height: 380px;
        background: var(--c-screen-off);
        border-radius: 4px;
        border: var(--stroke);
        position: relative;
        overflow: hidden;
    }

    .screen-content {
        position: absolute;
        inset: 0;
        background: var(--c-cream);
        opacity: 0; 
        transition: opacity 0.2s;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .screen-content.on { opacity: 1; }

    .scanlines {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent, transparent 50%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.05));
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 50;
    }

    .osd {
        position: absolute;
        top: 20px;
        right: 25px;
        font-family: var(--font-mono);
        color: var(--c-osd);
        font-size: 24px;
        z-index: 60;
        text-shadow: 0 0 5px var(--c-osd);
        opacity: 0;
        transition: opacity 0.3s;
    }
    .osd.visible { opacity: 1; }

    canvas#static {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 40;
        opacity: 0;
        pointer-events: none;
    }

    .control-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 20px 10px;
        width: 120px;
        background: var(--shelf-wood);
        border-left: var(--stroke);
        margin: -30px -30px -30px 0;
        border-radius: 0 12px 12px 0;
    }

    .brand-badge {
        font-family: var(--font-display);
        background: var(--c-red);
        color: white;
        border: var(--stroke);
        padding: 8px;
        border-radius: 4px;
        font-size: 12px;
        text-align: center;
        line-height: 1.1;
        box-shadow: var(--shadow-solid-sm);
    }

    .speaker-grill {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: auto;
        margin-bottom: 20px;
    }
    .hole {
        width: 10px;
        height: 10px;
        background: var(--shelf-shadow);
        border-radius: 2px;
    }

    .main-dial {
        width: 60px;
        height: 60px;
        background: var(--c-cream);
        border: var(--stroke);
        border-radius: 50%;
        position: relative;
        box-shadow: var(--shadow-solid-sm);
        cursor: pointer;
    }
    .main-dial::after {
        content: '';
        position: absolute;
        top: 5px;
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 20px;
        background: var(--c-red);
        border-radius: 2px;
    }

    
    .remote-wrapper {
        position: relative;
        transform: rotate(-2deg);
    }

    .remote {
        background: var(--c-cream);
        border: var(--stroke);
        border-radius: 12px;
        width: 140px;
        padding: 25px 20px;
        box-shadow: 10px 12px 0px var(--c-brown);
        display: flex;
        flex-direction: column;
        gap: 20px;
        position: relative;
        z-index: 10;
    }

    .btn {
        background: var(--shelf-wood);
        border: var(--stroke);
        border-radius: 6px;
        height: 40px;
        font-family: var(--font-display);
        font-size: 18px;
        color: var(--c-brown);
        cursor: pointer;
        box-shadow: 0 4px 0 var(--c-brown);
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.1s;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 0px 0 var(--c-brown); }
    .btn.power { grid-column: 1 / -1; background: var(--c-red); color: white; }

    
    .ch-intro {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 30px;
        background: var(--c-cream);
        position: relative;
    }
    .ch-intro h1 {
        font-family: var(--font-display);
        font-size: 58px;
        line-height: 0.9;
        color: var(--c-brown);
        margin-top: 20px;
    }
    .ch-intro .subtitle {
        color: var(--c-red);
        font-weight: 900;
        letter-spacing: 2px;
        font-size: 14px;
    }

    
    .ext-sticker {
        position: absolute;
        z-index: 25;
        filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.15));
    }
    
    .st-1 { top: -25px; right: 20px; width: 70px; }
    
    .st-2 { bottom: 30px; left: -35px; width: 80px; transform: rotate(-15deg); }
    
    .st-3 { bottom: -20px; right: -10px; width: 60px; transform: rotate(10deg); }

</style>
</head>
<body vid="6">

<div id="scene" vid="7">
    <div class="tv-wrapper" vid="8">
        <div class="tv-feet" vid="9">
            <div class="foot" vid="10"></div>
            <div class="foot" vid="11"></div>
        </div>
        
        
        <svg class="ext-sticker st-1" viewBox="0 0 100 100" vid="12">
            <circle cx="50" cy="55" r="35" fill="#D36A49" stroke="#5D3E2E" stroke-width="6" vid="13"></circle>
            <path d="M50 25 L45 15 L55 15 Z" fill="#4ADE80" stroke="#5D3E2E" stroke-width="4" vid="14"></path>
            <rect x="47" y="10" width="6" height="10" fill="#5D3E2E" rx="2" vid="15"></rect>
        </svg>

        <div class="tv-body" vid="16">
            <div class="screen-bezel" vid="17">
                <div class="screen-glass" vid="18">
                    <canvas id="static" vid="19"></canvas>
                    <div class="scanlines" vid="20"></div>
                    <div class="screen-content" id="screen-display" vid="21"></div>
                    <div class="osd" id="osd" vid="22">CH 01</div>
                </div>
            </div>

            <div class="control-panel" vid="23">
                <div class="brand-badge" vid="24">
                    LOCAL<br vid="25">PRODUCE
                </div>
                
                <div class="main-dial" id="dial" vid="26"></div>
                
                <div class="speaker-grill" vid="27">
                    <div class="hole" vid="28"></div><div class="hole" vid="29"></div><div class="hole" vid="30"></div>
                    <div class="hole" vid="31"></div><div class="hole" vid="32"></div><div class="hole" vid="33"></div>
                    <div class="hole" vid="34"></div><div class="hole" vid="35"></div><div class="hole" vid="36"></div>
                </div>
            </div>
        </div>
        
        
        <svg class="ext-sticker st-2" viewBox="0 0 100 100" vid="37">
            <path d="M30 20 L70 20 L55 85 L45 85 Z" fill="#E28935" stroke="#5D3E2E" stroke-width="6" vid="38"></path>
            <path d="M40 20 Q 50 5 60 20" fill="none" stroke="#4ADE80" stroke-width="6" stroke-linecap="round" vid="39"></path>
            <path d="M45 40 H 55 M43 55 H 57" stroke="#5D3E2E" stroke-width="4" stroke-linecap="round" vid="40"></path>

            <svg class="ext-sticker st-3" viewBox="0 0 100 100" vid="49">

<script vid="54">
    const channels = {
        1: `<div class="ch-intro"><div class="subtitle">UI / UX DESIGNER</div><h1>ORGANIC<br>DIGITAL<br>GOODS</h1></div>`,
        2: `<div style="padding:20px;"><h2>INVENTORY</h2><hr style="margin:10px 0; border:2px solid var(--c-brown);"><p>Web Design</p><p>App Dev</p><p>Branding</p></div>`,
        3: `<div style="height:100%; background:var(--c-brown); display:flex; align-items:center; justify-content:center; color:white;">VIDEO FEED</div>`,
        4: `<div style="height:100%; background:var(--c-yellow); display:flex; flex-direction:column; align-items:center; justify-content:center;"><h2>CHECKOUT</h2><p>hello@market.com</p></div>`
    };

    let isOn = false;
    let currentChannel = 1;
    let isAnimating = false;
    const screenDisplay = document.getElementById('screen-display');
    const osd = document.getElementById('osd');
    const dial = document.getElementById('dial');
    const canvas = document.getElementById('static');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    window.onresize = resize; resize();

    function drawStatic() {
        if (canvas.style.opacity === '0') return;
        const idata = ctx.createImageData(canvas.width, canvas.height);
        const buffer = new Uint32Array(idata.data.buffer);
        for(let i=0; i<buffer.length; i++) buffer[i] = 0xff000000 | (Math.random()*255 << 16) | (Math.random()*255 << 8) | Math.random()*255;
        ctx.putImageData(idata, 0, 0);
        requestAnimationFrame(drawStatic);
    }

    function changeChannel(num) {
        if (!isOn || isAnimating) return;
        isAnimating = true;
        currentChannel = num;
        dial.style.transform = `rotate(${num * 90}deg)`;
        canvas.style.opacity = '1';
        drawStatic();
        setTimeout(() => {
            screenDisplay.innerHTML = channels[num];
            osd.textContent = `CH 0${num}`;
            osd.classList.add('visible');
            canvas.style.opacity = '0';
            isAnimating = false;
            setTimeout(() => osd.classList.remove('visible'), 2000);
        }, 300);
    }

    function togglePower() {
        isOn = !isOn;
        if(isOn) {
            canvas.style.opacity = '1';
            drawStatic();
            setTimeout(() => {
                canvas.style.opacity = '0';
                screenDisplay.classList.add('on');
                changeChannel(1);
            }, 400);
        } else {
            screenDisplay.classList.remove('on');
            canvas.style.opacity = '0';
        }
    }
    
    togglePower();
</script>
