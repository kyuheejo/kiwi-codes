<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Kiwi - Freshly Squeezing...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Inter:wght@400;600;800;900&amp;family=Titan+One&amp;display=swap" rel="stylesheet" vid="7">
    
    <style vid="8">
        :root {
            --bg-color: #E87A35; 
            --pouch-bg: #F4EBE1; 
            --kiwi-main: #6CA632; 
            --kiwi-light: #9BD94E; 
            --kiwi-dark: #4A7320; 
            --seed-black: #2A1F1A; 
            --accent-yellow: #F2C12E; 
            --font-logo: 'Titan One', cursive;
            --font-display: 'Fredoka', sans-serif;
            --font-data: 'Inter', sans-serif;
            --pouch-width: 400px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-display);
            overflow: hidden;
        }

        .splash-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        
        .pouch-mini {
            width: var(--pouch-width);
            background-color: var(--pouch-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            animation: squeeze 2s ease-in-out infinite;
            transform-origin: center;
            border: 4px solid var(--seed-black);
        }

        @keyframes squeeze {
            0%, 100% { transform: scaleX(1); }
            50% { transform: scaleX(0.92) scaleY(1.05); }
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            background-color: var(--kiwi-main);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            border: 3px solid var(--kiwi-dark);
            position: relative;
            overflow: hidden;
        }

        .logo-circle::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: #F4EBE1;
            border-radius: 50%;
        }

        .pouch-text {
            font-family: var(--font-logo);
            color: var(--seed-black);
            font-size: 32px;
            text-align: center;
            line-height: 0.9;
        }

        
        .progress-wrapper {
            width: 100%;
            margin-top: 30px;
            position: relative;
        }

        .juice-bar-container {
            width: 100%;
            height: 40px;
            background: #fff;
            border: 4px solid var(--seed-black);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .juice-fill {
            height: 100%;
            width: 0%;
            background-color: var(--kiwi-light);
            border-right: 4px solid var(--kiwi-dark);
            animation: fillJuice 4s ease-out forwards;
            position: relative;
        }

        
        .juice-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.4) 20%, transparent 20%);
            background-size: 15px 15px;
            animation: moveBubbles 2s linear infinite;
        }

        @keyframes fillJuice {
            0% { width: 0%; }
            20% { width: 15%; }
            40% { width: 45%; }
            70% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes moveBubbles {
            from { background-position: 0 0; }
            to { background-position: 30px 0; }
        }

        .loading-tagline {
            margin-top: 24px;
            color: white;
            font-family: var(--font-logo);
            font-size: 22px;
            text-shadow: 2px 2px 0px var(--seed-black);
            letter-spacing: 1px;
            animation: pulse 1.5s ease-in-out infinite;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        
        .bg-fruit {
            position: absolute;
            z-index: 1;
            opacity: 0.3;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(20px, -20px) rotate(10deg); }
        }

        .straw {
            position: absolute;
            top: -50px;
            right: 60px;
            width: 25px;
            height: 80px;
            background: repeating-linear-gradient(45deg, #fff, #fff 10px, var(--bg-color) 10px, var(--bg-color) 20px);
            border: 4px solid var(--seed-black);
            border-radius: 5px;
            transform: rotate(15deg);
            z-index: -1;
        }
    </style>
</head>
<body vid="9">

    
    <svg class="bg-fruit" style="top: 10%; left: 10%;" width="120" height="120" viewBox="0 0 200 200" vid="10">
        <circle cx="100" cy="100" r="80" fill="var(--kiwi-main)" vid="11"></circle>
        <circle cx="100" cy="100" r="30" fill="white" vid="12"></circle>
    </svg>
    <svg class="bg-fruit" style="bottom: 15%; right: 10%;" width="150" height="150" viewBox="0 0 160 140" vid="13">
        <path fill="var(--accent-yellow)" d="M150,70 C150,110 110,130 70,130 C20,130 10,90 10,50 C10,10 60,10 100,10 C140,10 150,30 150,70 Z" vid="14"></path>
    </svg>

    <div class="splash-container" vid="15">
        <div class="pouch-mini" vid="16">
            <div class="straw" vid="17"></div>
            <div class="logo-area" vid="18">
                <div class="logo-circle" vid="19"></div>
                <div class="pouch-text" vid="20">KIWI<br vid="21">MADE</div>
            </div>
            
            <div class="progress-wrapper" vid="22">
                <div class="juice-bar-container" vid="23">
                    <div class="juice-fill" vid="24"></div>
                </div>
            </div>
            
            <div style="margin-top: 15px; text-align: center; font-family: var(--font-data); font-weight: 800; font-size: 12px; color: var(--kiwi-dark);" vid="25">
                VITAMIN-RICH UI INCOMING
            </div>
        </div>

        <h1 class="loading-tagline" vid="26">Freshly Squeezing<br vid="27">Your Experience...</h1>
    </div>

    <script vid="28">
        
        setTimeout(() => {
            
            console.log("Ready to pour!");
        }, 4000);
    </script>

</body></html>
